# cat << ►_◄ > /dev/null

# Enable 256 colors
set -g default-terminal "screen-256color"

# Use ` instead of ctrl-b
unbind C-b
set -g prefix `
bind ` send-prefix

# Set scrollback to 10000 lines
set -g history-limit 10000

# status bar on top
set-option -g status-position top

# Start index at 1
set -g base-index 1

# Renumber windows when window closes
set -g renumber-windows on

# set window title to user@server
set -g set-titles on
set -g set-titles-string '#h ❐ #S ● #I #W'

# Tab management
bind -n S-down new-window
bind -n S-up command-prompt 'rename-window %%'
bind -n S-left prev
bind -n S-right next
bind -n C-left swap-window -t -1
bind -n C-right swap-window -t +1

# Splits
bind a split-window -h
bind A split-window -v

# Better pane movement
bind -r h select-pane -L
bind -r t select-pane -D
bind -r n select-pane -U
bind -r s select-pane -R

# Better pane resizing
bind -r H resize-pane -L 5
bind -r T resize-pane -D 5
bind -r N resize-pane -U 5
bind -r S resize-pane -R 5

# Reload Config
unbind r
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# listen to alerts from all windows
set -g bell-action any

# enable mouse scroll
setw -g mode-mouse on

set -sg escape-time 0

# clipboard copy/paste
unbind c
bind c run "tmux show-buffer | xsel -i -b"
bind v run "tmux set-buffer -- \"$(xsel -o -b)\"; tmux paste-buffer"

set-window-option -g mode-keys vi
bind ESCAPE copy-mode
unbind p
bind p paste-buffer
bind -t vi-copy v begin-selection
bind -t vi-copy y copy-selection
bind -t vi-copy t cursor-down
bind -t vi-copy n cursor-up
bind -t vi-copy h cursor-left
bind -t vi-copy s cursor-right

# monitor activity
setw -g monitor-activity on
set -g visual-activity on

# -- 8< ------------------------------------------------------------------------

run 'cut -c3- ~/.tmux.conf | sh -s apply_theme'

