# Enable 256 colors
set -g default-terminal "screen-256color"

# Use ` instead of ctrl-b
unbind C-b
set -g prefix `
bind-key ` send-prefix

# Set scrollback to 10000 lines
set -g history-limit 10000

# Start index at 1
set -g base-index 1

# set window title to user@server
set -g set-titles on
#set -g set-titles-string "#T"
set -g set-titles-string '#h ❐ #S ● #I #W'

# status bar on top
set-option -g status-position top

# Tab management
bind -n S-down new-window
bind -n S-up command-prompt 'rename-window %%'
bind -n S-left prev
bind -n S-right next
bind -n C-left swap-window -t -1
bind -n C-right swap-window -t +1

# Reload Config
unbind r
bind-key r source-file ~/.tmux.conf \; display "Config reloaded"

# listen to alerts from all windows
set -g bell-action any

# enable mouse scroll
setw -g mode-mouse on

set-window-option -g mode-keys vi

# --- colors (solarized dark)
# default statusbar colors
set -g status-bg black
set -g status-fg yellow
set -g status-attr default

# default window title colors
setw -g window-status-fg brightblue
setw -g window-status-bg default

# active window title colors
setw -g window-status-current-fg yellow
setw -g window-status-current-bg default
setw -g window-status-current-attr dim

# pane border
set -g pane-border-fg black
set -g pane-border-bg default
set -g pane-active-border-fg yellow
set -g pane-active-border-bg default

# command line/message text
set -g message-bg black
set -g message-fg yellow

# pane number display
set -g display-panes-active-colour yellow
set -g display-panes-colour brightblue

# clock
setw -g clock-mode-colour yellow
# --- end colors

# Status line config
set -g status-left-length 32
set -g status-right-length 150
set -g status-fg white
set -g status-bg colour234
set -g window-status-activity-attr bold
set -g pane-border-fg colour245
set -g pane-active-border-fg colour39
set -g message-fg colour16
set -g message-bg colour221
set -g message-attr bold
set -g status-left "#[fg=colour235,bg=colour252,bold] ❐ #S #[fg=colour238,bg=colour234,nobold]"
set -g window-status-format "#[fg=colour15,bg=colour234] #I #W "
set -g window-status-current-format "#[fg=colour234,bg=colour39]#[fg=colour25,bg=colour39,noreverse,bold] #I  #W #[fg=colour39,bg=colour234,nobold]"
set -g status-right "#[fg=colour39,bg=colour234]#[fg=colour25,bg=colour39,noreverse,bold] #(hostname) #[fg=colour234,bg=colour39]#[fg=colour39,bg=colour234] %H:%M"
